name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  security-events: write

env:
  GO_VERSION: '1.26.0'
  NODE_VERSION: '24'
  REGISTRY: ghcr.io
  IMAGE_NAME: xerolux/modbridge

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download && go mod verify

      - name: Run go fmt
        run: |
          fmt_output=$(gofmt -l .)
          if [ -n "$fmt_output" ]; then
            echo "The following files need formatting:"
            echo "$fmt_output"
            exit 1
          fi

      - name: Run go vet
        env:
          CGO_ENABLED: 1
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        env:
          CGO_ENABLED: 1
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.txt
        continue-on-error: true

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  build-binaries:
    name: Build Go Binaries
    runs-on: ubuntu-latest
    needs: [quality, test, build-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
            packages: ''
            cc: ''
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
            packages: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
          - goos: linux
            goarch: arm
            goarm: '6'
            suffix: linux-arm
            packages: gcc-arm-linux-gnueabihf
            cc: arm-linux-gnueabihf-gcc
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install cross-compiler
        if: matrix.packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Copy frontend to pkg/web/dist
        run: |
          mkdir -p pkg/web/dist
          rm -rf pkg/web/dist/*
          cp -r frontend/dist/* pkg/web/dist/

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          OUTPUT="modbridge-${{ matrix.suffix }}"
          go build \
            -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -trimpath \
            -o "$OUTPUT" \
            .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: modbridge-${{ matrix.suffix }}
          path: modbridge-${{ matrix.suffix }}
          retention-days: 7

  build-docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-binaries]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: modbridge-*
          merge-multiple: true

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -name 'modbridge*' -exec cp {} release/ \;
          cd release
          sha256sum modbridge-* > checksums.txt
          ls -lh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## ModBridge v${{ steps.version.outputs.VERSION }}

            ### Docker
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            docker run -d -p 8080:8080 -p 5020-5030:5020-5030 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            ```

            ### Binary Download
            Download the appropriate binary for your platform from the assets below.

            **Available Binaries:**
            - **linux-amd64**: Standard x86_64 servers (Intel/AMD)
            - **linux-arm64**: ARM64 devices (Raspberry Pi 4/5, 64-bit OS)
            - **linux-arm**: ARMv6 32-bit (Raspberry Pi Zero/1/2/3, 32-bit OS)

            **Note:** Headless versions (without WebUI) are also available - look for files ending in `-headless`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
