name: Build Headless (No WebUI)

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: '1.26.0'

jobs:
  build-headless:
    name: Build Headless Binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64-headless
            packages: ''
            cc: ''
          - goos: linux
            goarch: arm64
            suffix: linux-arm64-headless
            packages: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
          - goos: linux
            goarch: arm
            goarm: '6'
            suffix: linux-arm-headless
            packages: gcc-arm-linux-gnueabihf
            cc: arm-linux-gnueabihf-gcc
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install cross-compiler
        if: matrix.packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}

      - name: Build headless binary (no WebUI)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          OUTPUT="modbridge-${{ matrix.suffix }}"
          go build \
            -tags headless \
            -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -trimpath \
            -o "$OUTPUT" \
            .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: modbridge-${{ matrix.suffix }}
          path: modbridge-${{ matrix.suffix }}
          retention-days: 7
