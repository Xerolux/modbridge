name: Build Headless (No WebUI)

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release with binaries'
        required: false
        default: false
        type: boolean
      version_tag:
        description: 'Version tag (e.g. v1.0.0) - required if create_release is true'
        required: false
        type: string

  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: '1.24.0'

jobs:
  build-headless:
    name: Build Headless Binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64-headless
            packages: ''
            cc: ''
          - goos: linux
            goarch: arm64
            suffix: linux-arm64-headless
            packages: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install cross-compiler
        if: matrix.packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}

      - name: Build headless binary (no WebUI)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          OUTPUT="modbridge-${{ matrix.suffix }}"
          go build \
            -tags headless \
            -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -trimpath \
            -o "$OUTPUT" \
            ./main.go

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: modbridge-${{ matrix.suffix }}
          path: modbridge-${{ matrix.suffix }}
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-headless]
    # Only run if manually triggered with create_release=true OR if it's a tag push
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.create_release == true) ||
      startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.version_tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: modbridge-*-headless
          merge-multiple: true

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -name 'modbridge*' -exec cp {} release/ \;
          cd release
          sha256sum modbridge-* > checksums.txt
          ls -lh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: "ModBridge v${{ steps.version.outputs.VERSION }} (Headless)"
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## ModBridge v${{ steps.version.outputs.VERSION }} - Headless Build

            This is the **headless** version without WebUI. Perfect for running ModBridge with just a config file.

            ### Features
            - ✅ No WebUI - smaller binary size
            - ✅ Config file based configuration
            - ✅ Lower memory footprint
            - ✅ Perfect for embedded systems or servers

            ### Download
            Download the appropriate binary for your platform:
            - **linux-amd64**: Standard x86_64 servers (Intel/AMD)
            - **linux-arm64**: ARM64 devices (Raspberry Pi 4/5, ARM servers)

            ### Installation
            ```bash
            # Download binary
            wget https://github.com/Xerolux/modbridge/releases/download/v${{ steps.version.outputs.VERSION }}/modbridge-linux-amd64-headless

            # Make executable
            chmod +x modbridge-linux-amd64-headless

            # Create config file (if not exists)
            ./modbridge-linux-amd64-headless -config > modbridge-config.json

            # Run
            ./modbridge-linux-amd64-headless -config modbridge-config.json
            ```

            ### Verification
            ```bash
            # Verify checksum
            sha256sum -c checksums.txt
            ```

            **Note:** If you need the WebUI, download the standard version instead.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
