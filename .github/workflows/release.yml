name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version_mode:
        description: 'Version mode'
        required: true
        default: auto
        type: choice
        options: [auto, manual]
      version:
        description: 'Version (manual only, e.g. v1.0.0)'
        required: false
        type: string
      bump:
        description: 'Auto increment (auto only)'
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]
      release_type:
        description: 'Release type'
        required: true
        default: release
        type: choice
        options: [release, beta, alpha]
      make_latest:
        description: 'Mark as latest release'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

env:
  GO_VERSION: '1.26.4'
  NODE_VERSION: '24'

jobs:
  prepare:
    name: Prepare Release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.compute.outputs.tag }}
      prerelease: ${{ steps.compute.outputs.prerelease }}
      valid: ${{ steps.compute.outputs.valid }}
    steps:
      - uses: actions/checkout@v7

      - name: Validate & compute release info
        id: compute
        run: |
          MODE="${{ inputs.version_mode }}"
          VERSION="${{ inputs.version }}"
          BUMP="${{ inputs.bump }}"
          TYPE="${{ inputs.release_type }}"

          git fetch --tags --force
          LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$' | sort -V | tail -n 1 || true)

          if [ "$MODE" = "manual" ]; then
            if [ -z "$VERSION" ]; then
              echo "Manual mode requires version input."
              exit 1
            fi
            [[ "$VERSION" != v* ]] && VERSION="v${VERSION}"
          else
            BASE_VERSION="${LATEST_TAG#v}"
            if [ -z "$BASE_VERSION" ]; then
              BASE_VERSION=$(tr -d '[:space:]' < version.txt)
            fi
            if [[ ! "$BASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
              echo "Cannot determine valid base version."
              exit 1
            fi
            IFS='.' read -r MAJOR MINOR PATCH BUILD <<< "$BASE_VERSION"
            case "$BUMP" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0; BUILD="" ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0; BUILD="" ;;
              patch)
                if [ -n "${BUILD:-}" ]; then
                  BUILD=$((BUILD + 1))
                else
                  PATCH=$((PATCH + 1))
                fi
                ;;
              *) echo "Unknown bump: $BUMP"; exit 1 ;;
            esac
            if [ -n "${BUILD:-}" ]; then
              VERSION="v${MAJOR}.${MINOR}.${PATCH}.${BUILD}"
            else
              VERSION="v${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Invalid format: '$VERSION'. Use v1.2.3 or v1.2.3.4"
            exit 1
          fi

          if [ "$TYPE" = "release" ]; then
            TAG="$VERSION"
            PRERELEASE="false"
          else
            TAG="${VERSION}-${TYPE}"
            PRERELEASE="true"
          fi

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            if [[ "$VERSION" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              MAJOR="${BASH_REMATCH[1]}"
              MINOR="${BASH_REMATCH[2]}"
              PATCH="${BASH_REMATCH[3]}"
              BUILD="${BASH_REMATCH[4]}"
              while git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; do
                BUILD=$((BUILD + 1))
                VERSION="v${MAJOR}.${MINOR}.${PATCH}.${BUILD}"
                if [ "$TYPE" = "release" ]; then
                  TAG="$VERSION"
                else
                  TAG="${VERSION}-${TYPE}"
                fi
              done
            else
              echo "Tag ${TAG} already exists."
              exit 1
            fi
          fi

          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "prerelease=${PRERELEASE}" >> $GITHUB_OUTPUT
          echo "valid=true" >> $GITHUB_OUTPUT
          echo "Tag: ${TAG} | Prerelease: ${PRERELEASE}"

      - name: Create tag via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git rev-parse HEAD)
          TAG="${{ steps.compute.outputs.tag }}"
          gh api repos/${{ github.repository }}/git/refs \
            -f ref="refs/tags/${TAG}" \
            -f sha="$SHA"

  resolve-tag:
    name: Resolve Tag
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      valid: ${{ steps.resolve.outputs.valid }}
    steps:
      - id: resolve
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?(-(alpha|beta))?$ ]]; then
            echo "Ignoring non-release tag: ${TAG}"
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "valid=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          if [[ "$TAG" =~ -(alpha|beta)$ ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi
          echo "valid=true" >> $GITHUB_OUTPUT

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [prepare, resolve-tag]
    if: always() && (needs.prepare.outputs.valid == 'true' || needs.resolve-tag.outputs.valid == 'true')
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run tests
        env:
          CGO_ENABLED: 1
        run: go test -race ./...

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [prepare, resolve-tag]
    if: always() && (needs.prepare.outputs.valid == 'true' || needs.resolve-tag.outputs.valid == 'true')
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install & build
        working-directory: ./frontend
        run: npm ci && npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  build-binaries:
    name: Build (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    needs: [prepare, resolve-tag, test, build-frontend]
    if: always() && needs.test.result == 'success' && needs.build-frontend.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
            packages: ''
            cc: ''
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
            packages: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install cross-compiler
        if: matrix.packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}
      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist/
      - name: Copy frontend to embed path
        run: |
          mkdir -p pkg/web/dist
          rm -rf pkg/web/dist/*
          cp -r frontend/dist/* pkg/web/dist/
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          TAG="${{ needs.prepare.outputs.tag || needs.resolve-tag.outputs.tag || github.ref_name }}"
          go build \
            -ldflags="-s -w -X main.Version=${TAG}" \
            -trimpath \
            -o "modbridge-${{ matrix.suffix }}" \
            .
      - uses: actions/upload-artifact@v7
        with:
          name: modbridge-${{ matrix.suffix }}
          path: modbridge-${{ matrix.suffix }}
          retention-days: 7

  build-headless:
    name: Headless (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    needs: [prepare, resolve-tag, test]
    if: always() && needs.test.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64-headless
            packages: ''
            cc: ''
          - goos: linux
            goarch: arm64
            suffix: linux-arm64-headless
            packages: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
          - goos: linux
            goarch: arm
            goarm: '6'
            suffix: linux-arm-headless
            packages: gcc-arm-linux-gnueabihf
            cc: arm-linux-gnueabihf-gcc
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install cross-compiler
        if: matrix.packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}
      - name: Build headless binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          TAG="${{ needs.prepare.outputs.tag || needs.resolve-tag.outputs.tag || github.ref_name }}"
          go build \
            -tags headless \
            -ldflags="-s -w -X main.Version=${TAG}" \
            -trimpath \
            -o "modbridge-${{ matrix.suffix }}" \
            .
      - uses: actions/upload-artifact@v7
        with:
          name: modbridge-${{ matrix.suffix }}
          path: modbridge-${{ matrix.suffix }}
          retention-days: 7

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [prepare, resolve-tag, build-binaries, build-headless]
    if: always() && needs.build-binaries.result == 'success' && needs.build-headless.result == 'success'
    steps:
      - uses: actions/checkout@v7
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          pattern: modbridge-*
          merge-multiple: true
      - name: Prepare release files & checksums
        run: |
          mkdir -p release
          find artifacts -type f -name 'modbridge*' -exec cp {} release/ \;
          cd release && sha256sum modbridge-* > checksums.txt && ls -lh
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag || needs.resolve-tag.outputs.tag || github.ref_name }}
          name: "ModBridge ${{ needs.prepare.outputs.tag || needs.resolve-tag.outputs.tag || github.ref_name }}"
          files: release/*
          draft: false
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' || needs.resolve-tag.outputs.prerelease == 'true' || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          make_latest: ${{ !(contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta')) }}
          generate_release_notes: true
          body: |
            ## ModBridge ${{ needs.prepare.outputs.tag || needs.resolve-tag.outputs.tag || github.ref_name }}

            ### Binaries (with WebUI)
            | Platform | File |
            |----------|------|
            | Linux x64 | `modbridge-linux-amd64` |
            | Linux ARM64 | `modbridge-linux-arm64` |

            ### Headless Binaries (without WebUI)
            | Platform | File |
            |----------|------|
            | Linux x64 | `modbridge-linux-amd64-headless` |
            | Linux ARM64 | `modbridge-linux-arm64-headless` |
            | Linux ARMv6 (32-bit) | `modbridge-linux-arm-headless` |

            SHA256 checksums: see `checksums.txt`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
