name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: '1.26.3'
  NODE_VERSION: '24'

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run go fmt
        run: |
          fmt_output=$(gofmt -l .)
          if [ -n "$fmt_output" ]; then
            echo "The following files need formatting:"
            echo "$fmt_output"
            exit 1
          fi

      - name: Run go vet
        env:
          CGO_ENABLED: 1
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        env:
          CGO_ENABLED: 1
        run: |
          PACKAGES=$(go list -f '{{if or (len .TestGoFiles) (len .XTestGoFiles)}}{{.ImportPath}}{{end}}' ./...)
          go test -v -race -coverprofile=coverage.txt -covermode=atomic $PACKAGES

      - uses: codecov/codecov-action@v6
        with:
          file: ./coverage.txt
        continue-on-error: true

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: ./frontend
        run: npm ci && npm run build

      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  build-binaries:
    name: Build (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    needs: [quality, test, build-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
            packages: ''
            cc: ''
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
            packages: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install cross-compiler
        if: matrix.packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}

      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Copy frontend to embed path
        run: |
          mkdir -p pkg/web/dist
          rm -rf pkg/web/dist/*
          cp -r frontend/dist/* pkg/web/dist/

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          go build \
            -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -trimpath \
            -o "modbridge-${{ matrix.suffix }}" \
            .

      - uses: actions/upload-artifact@v7
        with:
          name: modbridge-${{ matrix.suffix }}
          path: modbridge-${{ matrix.suffix }}
          retention-days: 7
