name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  GO_VERSION: '1.26.4'
  NODE_VERSION: '24'

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run go fmt
        run: |
          fmt_output=$(gofmt -l .)
          if [ -n "$fmt_output" ]; then
            echo "The following files need formatting:"
            echo "$fmt_output"
            exit 1
          fi

      - name: Run go vet
        env:
          CGO_ENABLED: 1
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        env:
          CGO_ENABLED: 1
        run: |
          PACKAGES=$(go list -f '{{if or (len .TestGoFiles) (len .XTestGoFiles)}}{{.ImportPath}}{{end}}' ./...)
          go test -v -race -coverprofile=coverage.txt -covermode=atomic $PACKAGES

      - uses: codecov/codecov-action@v7
        with:
          file: ./coverage.txt
          continue-on-error: true

  benchmarks:
    name: Benchmark Guardrails
    runs-on: ubuntu-latest
    needs: [quality, test]
    # Run on PRs + pushes to main. Continue-on-error would hide regressions,
    # so the job fails the build when a threshold is exceeded. Thresholds are
    # intentionally generous (see scripts/ci/check_bench.sh) to reduce CI flak.
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run benchmark guardrails
        env:
          CGO_ENABLED: 1
        run: bash scripts/ci/check_bench.sh

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: ./frontend
        run: npm ci && npm run build

      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  build-binaries:
    name: Build (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    needs: [quality, test, build-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
            packages: ''
            cc: ''
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
            packages: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install cross-compiler
        if: matrix.packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}

      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Copy frontend to embed path
        run: |
          mkdir -p pkg/web/dist
          rm -rf pkg/web/dist/*
          cp -r frontend/dist/* pkg/web/dist/

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          go build \
            -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -trimpath \
            -o "modbridge-${{ matrix.suffix }}" \
            .

      - uses: actions/upload-artifact@v7
        with:
          name: modbridge-${{ matrix.suffix }}
          path: modbridge-${{ matrix.suffix }}
          retention-days: 7

  build-headless:
    name: Headless (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    needs: [quality, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64-headless
            packages: ''
            cc: ''
          - goos: linux
            goarch: arm64
            suffix: linux-arm64-headless
            packages: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
          - goos: linux
            goarch: arm
            goarm: '6'
            suffix: linux-arm-headless
            packages: gcc-arm-linux-gnueabihf
            cc: arm-linux-gnueabihf-gcc
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install cross-compiler
        if: matrix.packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}

      # Headless needs NO frontend-dist — it has no embedded Web UI and shares
      # only pkg/config, pkg/logger, pkg/manager with the Web binary.
      - name: Build headless binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          go build \
            -ldflags="-s -w -X main.Version=${{ github.ref_name == 'main' && 'dev' || github.ref_name }}" \
            -trimpath \
            -o "modbridge-${{ matrix.suffix }}" \
            ./cmd/modbridge-headless

      - uses: actions/upload-artifact@v7
        with:
          name: modbridge-${{ matrix.suffix }}
          path: modbridge-${{ matrix.suffix }}
          retention-days: 7

  auto-release:
    name: Auto Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [quality, test, build-frontend, build-binaries, build-headless]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: bump
        run: |
          git fetch --tags --force
          CURRENT=$(tr -d '[:space:]' < version.txt)
          IFS='.' read -r MAJOR MINOR PATCH BUILD <<< "$CURRENT"
          if [[ ! "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Invalid version in version.txt: ${CURRENT}"
            exit 1
          fi
          BUILD=${BUILD:-0}
          BUILD=$((BUILD + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}.${BUILD}"
          TAG="v${NEW_VERSION}"
          while git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; do
            BUILD=$((BUILD + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}.${BUILD}"
            TAG="v${NEW_VERSION}"
          done
          echo "$NEW_VERSION" > version.txt
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Bumping ${CURRENT} -> ${NEW_VERSION} (${TAG})"

      - name: Commit version bump & tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release ${{ steps.bump.outputs.tag }}"
          git push origin main --follow-tags

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          pattern: modbridge-*
          merge-multiple: true

      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend-dist/

      - name: Prepare release files & checksums
        run: |
          mkdir -p release
          find artifacts -type f -name 'modbridge*' -exec cp {} release/ \;
          cd release && sha256sum modbridge-* > checksums.txt && ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: "ModBridge ${{ steps.bump.outputs.tag }}"
          files: release/*
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
          body: |
            ## ModBridge ${{ steps.bump.outputs.tag }}

            ### Binaries (with WebUI)
            | Platform | File |
            |----------|------|
            | Linux x64 | `modbridge-linux-amd64` |
            | Linux ARM64 | `modbridge-linux-arm64` |

            ### Headless Binaries (without WebUI)
            | Platform | File |
            |----------|------|
            | Linux x64 | `modbridge-linux-amd64-headless` |
            | Linux ARM64 | `modbridge-linux-arm64-headless` |
            | Linux ARMv6 (32-bit) | `modbridge-linux-arm-headless` |

            SHA256 checksums: see `checksums.txt`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
