services:
  modbridge:
    # Option 1: Use pre-built image from GitHub Container Registry (recommended)
    # image: ghcr.io/xerolux/modbridge:latest

    # Option 2: Build locally (comment out 'image' above and uncomment below)
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}

    container_name: modbridge
    hostname: modbridge

    ports:
      - "8080:8080"         # Web UI
      - "5020-5030:5020-5030"  # Modbus proxy ports

    volumes:
      - ./config.json:/app/config.json:rw
      - modbus-data:/app/data
      - modbus-logs:/var/log/modbus

    environment:
      - WEB_PORT=:8080
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=${TZ:-UTC}
      # Enterprise Features
      - MODBRIDGE_MAX_CONNECTIONS=10000
      - MODBRIDGE_CIRCUIT_BREAKER_ENABLED=true
      - MODBRIDGE_CACHE_ENABLED=true
      - MODBRIDGE_CACHE_TTL=5s
      - MODBRIDGE_HEALTH_CHECK_INTERVAL=30s
      - MODBRIDGE_ALERTING_ENABLED=true

    restart: unless-stopped

    networks:
      - modbus-network

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    # Security settings
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /tmp:noexec,nosuid,size=100m

    # Resource limits (optimized for enterprise)
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 256M

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"

networks:
  modbus-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  modbus-data:
    driver: local
  modbus-logs:
    driver: local
